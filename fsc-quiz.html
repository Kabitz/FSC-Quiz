<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz FSC Madeira</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a3a1a;
    --canopy: #2d5a27;
    --leaf: #4a8c3f;
    --moss: #6ab04c;
    --lime: #9fd356;
    --mist: #e8f5e1;
    --bark: #3d2b1f;
    --cream: #f5f0e8;
    --gold: #c8a84b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--forest);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Organic background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 10% 20%, rgba(74,140,63,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 80%, rgba(45,90,39,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 50% 50%, rgba(26,58,26,0.8) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Leaf pattern overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 5 Q55 20 50 40 Q45 55 40 75 Q35 55 30 40 Q25 20 40 5Z' fill='none' stroke='%234a8c3f' stroke-width='0.4' opacity='0.15'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease both;
  }

  .fsc-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(159,211,86,0.3);
    border-radius: 100px;
    padding: 8px 20px;
    margin-bottom: 24px;
    backdrop-filter: blur(8px);
  }

  .fsc-badge .dot {
    width: 8px; height: 8px;
    background: var(--lime);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .fsc-badge span {
    color: var(--lime);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    color: var(--cream);
    line-height: 1.1;
    margin-bottom: 12px;
  }

  h1 em {
    color: var(--lime);
    font-style: italic;
  }

  .subtitle {
    color: rgba(232,245,225,0.6);
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 36px;
    animation: fadeIn 0.6s 0.3s ease both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .progress-label {
    color: rgba(232,245,225,0.5);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .progress-count {
    color: var(--lime);
    font-size: 13px;
    font-weight: 500;
  }

  .progress-track {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--leaf), var(--lime));
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 20px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
    animation: shimmer 1.5s infinite;
  }

  /* Concept card */
  .concept-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(159,211,86,0.15);
    border-left: 3px solid var(--lime);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 28px;
    backdrop-filter: blur(12px);
    animation: slideRight 0.5s ease both;
  }

  .concept-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .concept-icon {
    font-size: 18px;
  }

  .concept-tag {
    color: var(--lime);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .concept-text {
    color: rgba(232,245,225,0.85);
    font-size: 14px;
    line-height: 1.7;
    font-weight: 300;
  }

  .concept-text strong {
    color: var(--lime);
    font-weight: 500;
  }

  /* Question card */
  .question-card {
    animation: slideUp 0.5s ease both;
  }

  .question-number {
    font-size: 11px;
    color: rgba(232,245,225,0.35);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 2.5vw, 1.35rem);
    color: var(--cream);
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 28px;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .option-btn {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 16px 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    text-align: left;
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
  }

  .option-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(159,211,86,0.08), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .option-btn:hover:not(:disabled) {
    border-color: rgba(159,211,86,0.4);
    transform: translateX(4px);
  }

  .option-btn:hover:not(:disabled)::before { opacity: 1; }

  .option-letter {
    min-width: 28px;
    height: 28px;
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: rgba(232,245,225,0.5);
    flex-shrink: 0;
    transition: all 0.25s;
  }

  .option-text {
    color: rgba(232,245,225,0.8);
    font-size: 14px;
    line-height: 1.55;
    padding-top: 4px;
    font-weight: 300;
  }

  /* States */
  .option-btn.correct {
    border-color: var(--lime);
    background: rgba(106,176,76,0.12);
  }

  .option-btn.correct .option-letter {
    background: var(--lime);
    border-color: var(--lime);
    color: var(--forest);
    font-weight: 700;
  }

  .option-btn.correct .option-text { color: var(--mist); }

  .option-btn.wrong {
    border-color: rgba(220,80,60,0.5);
    background: rgba(220,80,60,0.08);
  }

  .option-btn.wrong .option-letter {
    background: rgba(220,80,60,0.4);
    border-color: rgba(220,80,60,0.5);
    color: #fff;
  }

  .option-btn.wrong .option-text { color: rgba(232,245,225,0.5); }

  .option-btn:disabled { cursor: not-allowed; }

  /* Feedback */
  .feedback {
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: rgba(106,176,76,0.12);
    border: 1px solid rgba(106,176,76,0.3);
  }

  .feedback.wrong-fb {
    background: rgba(220,80,60,0.08);
    border: 1px solid rgba(220,80,60,0.25);
  }

  .feedback-title {
    font-weight: 500;
    font-size: 13px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .feedback.correct-fb .feedback-title { color: var(--lime); }
  .feedback.wrong-fb .feedback-title { color: #e05a4a; }

  .feedback-body {
    color: rgba(232,245,225,0.7);
    font-size: 13px;
    line-height: 1.6;
    font-weight: 300;
  }

  /* Next button */
  .next-btn {
    background: linear-gradient(135deg, var(--leaf), var(--moss));
    border: none;
    border-radius: 10px;
    padding: 16px 32px;
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.25s;
    display: none;
    position: relative;
    overflow: hidden;
  }

  .next-btn.show { display: inline-flex; align-items: center; gap: 10px; }

  .next-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .next-btn:hover::after { opacity: 1; }
  .next-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(74,140,63,0.35); }

  /* Score screen */
  .score-screen {
    display: none;
    text-align: center;
    animation: fadeIn 0.6s ease;
  }

  .score-screen.show { display: block; }

  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: conic-gradient(var(--lime) var(--score-deg, 0deg), rgba(255,255,255,0.08) 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    position: relative;
  }

  .score-circle::before {
    content: '';
    position: absolute;
    width: 114px; height: 114px;
    border-radius: 50%;
    background: var(--forest);
  }

  .score-inner {
    position: relative;
    z-index: 1;
  }

  .score-num {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 900;
    color: var(--lime);
    line-height: 1;
  }

  .score-total {
    color: rgba(232,245,225,0.4);
    font-size: 12px;
    margin-top: 2px;
  }

  .score-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: var(--cream);
    margin-bottom: 12px;
  }

  .score-msg {
    color: rgba(232,245,225,0.6);
    font-size: 15px;
    font-weight: 300;
    max-width: 420px;
    margin: 0 auto 36px;
    line-height: 1.7;
  }

  .restart-btn {
    background: transparent;
    border: 1.5px solid rgba(159,211,86,0.4);
    border-radius: 10px;
    padding: 14px 32px;
    color: var(--lime);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.25s;
  }

  .restart-btn:hover {
    background: rgba(159,211,86,0.1);
    border-color: var(--lime);
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideRight {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  @keyframes shimmer {
    0% { transform: translateX(-20px); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateX(20px); opacity: 0; }
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(159,211,86,0.2), transparent);
    margin: 36px 0;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="fsc-badge">
      <div class="dot"></div>
      <span>Preparação para Auditoria</span>
    </div>
    <h1>Certificação <em>FSC</em><br>de Madeira</h1>
    <p class="subtitle">Quiz interativo com conceitos fundamentais</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span class="progress-label">Progresso</span>
      <span class="progress-count" id="progressCount">1 / 10</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:10%"></div>
    </div>
  </div>

  <div id="quizArea">
    <div class="concept-card" id="conceptCard">
      <div class="concept-label">
        <span class="concept-icon" id="conceptIcon">🌲</span>
        <span class="concept-tag">Conceito-chave</span>
      </div>
      <div class="concept-text" id="conceptText"></div>
    </div>

    <div class="question-card">
      <div class="question-number" id="questionNumber">QUESTÃO 01</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsArea"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="feedbackTitle"></div>
        <div class="feedback-body" id="feedbackBody"></div>
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        Próxima questão <span>→</span>
      </button>
    </div>
  </div>

  <div class="score-screen" id="scoreScreen">
    <div class="score-circle" id="scoreCircle">
      <div class="score-inner">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-total" id="scoreTotal">de 10</div>
      </div>
    </div>
    <h2 class="score-title" id="scoreTitle"></h2>
    <p class="score-msg" id="scoreMsg"></p>
    <button class="restart-btn" onclick="restart()">🔄 Reiniciar Quiz</button>
  </div>
</div>

<script>
const questions = [
  {
    icon: "🌳",
    concept: `O <strong>FSC (Forest Stewardship Council)</strong> é uma organização internacional sem fins lucrativos fundada em 1993. Sua missão é promover o manejo responsável das florestas do mundo. A certificação FSC garante que produtos de madeira vêm de florestas geridas de forma <strong>ambientalmente correta, socialmente benéfica e economicamente viável</strong>.`,
    question: "O que significa a sigla FSC e qual é o seu principal objetivo?",
    options: [
      "Forest Supply Chain — rastrear a cadeia de fornecimento de madeira",
      "Forest Stewardship Council — promover o manejo responsável das florestas",
      "Federal Sustainability Certification — certificar empresas sustentáveis",
      "Forestry Standards Committee — padronizar a exploração florestal"
    ],
    correct: 1,
    explanation: "O FSC (Forest Stewardship Council) foi fundado em 1993 e tem como missão garantir que o manejo florestal seja ambientalmente correto, socialmente benéfico e economicamente viável."
  },
  {
    icon: "📜",
    concept: `A certificação FSC possui <strong>dois tipos principais</strong>:<br><br>
    • <strong>FSC de Manejo Florestal (FM)</strong>: certifica que a floresta em si é gerida de forma responsável.<br>
    • <strong>FSC de Cadeia de Custódia (CoC)</strong>: certifica que o material FSC foi corretamente identificado, separado e rastreado ao longo de toda a cadeia produtiva — da floresta ao consumidor final.`,
    question: "Uma empresa que processa e vende madeira certificada precisa de qual tipo de certificação FSC?",
    options: [
      "Apenas FSC de Manejo Florestal (FM)",
      "FSC de Cadeia de Custódia (CoC)",
      "Certificação de Produto Ecológico (CPE)",
      "Nenhuma certificação é necessária para processadores"
    ],
    correct: 1,
    explanation: "Empresas que processam, transformam ou comercializam produtos FSC precisam da certificação de Cadeia de Custódia (CoC), que garante a rastreabilidade do material certificado ao longo de toda a cadeia."
  },
  {
    icon: "🏷️",
    concept: `O FSC possui <strong>três categorias de produtos</strong>:<br><br>
    • <strong>FSC 100%</strong>: todo o material vem de florestas certificadas FSC.<br>
    • <strong>FSC Misto (Mix)</strong>: combinação de material FSC certificado, material de fontes controladas e/ou material reciclado.<br>
    • <strong>FSC Reciclado</strong>: feito com material 100% reciclado pós-consumo ou pré-consumo.`,
    question: "Um produto com rótulo 'FSC Mix' contém necessariamente:",
    options: [
      "100% de madeira de florestas certificadas FSC",
      "100% de material reciclado",
      "Combinação de material FSC, controlado e/ou reciclado",
      "Material de qualquer origem não rastreada"
    ],
    correct: 2,
    explanation: "O rótulo FSC Mix indica que o produto contém uma combinação de material de floresta certificada FSC, material de fontes controladas e/ou material reciclado — não necessariamente 100% certificado."
  },
  {
    icon: "🔍",
    concept: `<strong>Fontes Controladas</strong> (Controlled Wood) são materiais de madeira que, embora não sejam de florestas certificadas, foram verificados para garantir que NÃO provêm de:<br><br>
    • Florestas exploradas ilegalmente<br>
    • Florestas com alto valor de conservação ameaçadas<br>
    • Florestas convertidas para outros usos<br>
    • Áreas com violação de direitos indígenas e trabalhistas<br>
    • Madeira de organismos geneticamente modificados`,
    question: "Qual das alternativas abaixo NÃO é uma categoria excluída nas fontes controladas FSC?",
    options: [
      "Madeira explorada ilegalmente",
      "Madeira de florestas com alto valor de conservação",
      "Madeira de florestas convertidas para uso agropecuário",
      "Madeira de espécies de crescimento lento, porém de manejo legal certificado"
    ],
    correct: 3,
    explanation: "Madeira de crescimento lento com manejo legal e certificado não é excluída das fontes controladas. As exclusões referem-se à ilegalidade, destruição de florestas de alto valor, conversão de uso e violação de direitos."
  },
  {
    icon: "⛓️",
    concept: `A <strong>Cadeia de Custódia (CoC)</strong> é o mecanismo de rastreabilidade que documenta o caminho do produto certificado desde a floresta até o consumidor. Para manter a integridade da certificação, a empresa deve:<br><br>
    • Separar fisicamente ou identificar o material FSC do não-FSC<br>
    • Manter registros de compras, vendas e volumes<br>
    • Calcular percentuais de conteúdo FSC quando necessário<br>
    • Garantir que fornecedores sejam certificados`,
    question: "Durante uma auditoria FSC CoC, o auditor solicitará principalmente:",
    options: [
      "Apenas o selo FSC nos produtos finais",
      "Registros de rastreabilidade, separação de materiais e documentos de compra e venda",
      "Somente o contrato com a floresta certificada",
      "Laudos ambientais da área de extração"
    ],
    correct: 1,
    explanation: "O auditor de CoC verifica toda a rastreabilidade: registros de entrada e saída de material, separação física ou por identificação, documentos de compra e venda com referência ao certificado FSC do fornecedor."
  },
  {
    icon: "📊",
    concept: `O FSC permite dois <strong>sistemas de transferência de crédito</strong> na cadeia de custódia:<br><br>
    • <strong>Separação física</strong>: materiais FSC e não-FSC são fisicamente separados em todo o processo.<br>
    • <strong>Sistema de porcentagem</strong>: calcula-se a proporção de material FSC e permite misturá-lo com material controlado, mantendo um percentual mínimo.`,
    question: "Uma empresa usa o sistema de porcentagem FSC. O que ela deve garantir?",
    options: [
      "Que 100% do material seja sempre certificado FSC",
      "Que a proporção de material FSC no produto final seja calculada e documentada periodicamente",
      "Que os fornecedores não possuam certificação FSC",
      "Que o material não-FSC seja descartado"
    ],
    correct: 1,
    explanation: "No sistema de porcentagem, a empresa calcula e documenta periodicamente (em geral por trimestre) qual proporção do material processado é FSC, garantindo que o percentual mínimo exigido seja atingido para reivindicar o rótulo."
  },
  {
    icon: "🌿",
    concept: `Os <strong>10 Princípios FSC de Manejo Florestal</strong> abrangem:<br><br>
    P1: Conformidade com a legislação | P2: Direitos dos trabalhadores | P3: Direitos dos povos indígenas | P4: Relações com comunidades | P5: Benefícios da floresta | P6: Valores ambientais | P7: Planejamento | P8: Monitoramento | P9: Altos Valores de Conservação | P10: Implementação das atividades de manejo`,
    question: "Qual princípio FSC trata especificamente da proteção de Altos Valores de Conservação (AVC)?",
    options: [
      "Princípio 2 — Direitos dos trabalhadores",
      "Princípio 5 — Benefícios da floresta",
      "Princípio 9 — Altos Valores de Conservação",
      "Princípio 10 — Implementação das atividades"
    ],
    correct: 2,
    explanation: "O Princípio 9 do FSC trata especificamente dos Altos Valores de Conservação (HCV - High Conservation Values), exigindo que o gestor identifique, mantenha e/ou aprimore esses valores na floresta manejada."
  },
  {
    icon: "🏢",
    concept: `O <strong>código de certificação FSC</strong> segue o formato: <strong>FSC-C[XXXXXX]</strong> para Cadeia de Custódia. Este código deve aparecer em:<br><br>
    • Documentos de venda (faturas, notas fiscais) quando o produto for vendido como FSC<br>
    • Rótulos dos produtos FSC<br>
    • Material de marketing que reivindique o status FSC<br><br>

let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
  const q = questions[current];
  answered = false;

  // Progress
  const pct = ((current + 1) / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${current + 1} / ${questions.length}`;

  // Concept
  document.getElementById('conceptIcon').textContent = q.icon;
  document.getElementById('conceptText').innerHTML = q.concept;

  // Question
  document.getElementById('questionNumber').textContent = `QUESTÃO ${String(current + 1).padStart(2, '0')}`;
  document.getElementById('questionText').textContent = q.question;

  // Options
  const letters = ['A', 'B', 'C', 'D'];
  const area = document.getElementById('optionsArea');
  area.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text">${opt}</span>`;
    btn.onclick = () => selectOption(i, btn);
    area.appendChild(btn);
  });

  // Reset feedback
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  document.getElementById('nextBtn').className = 'next-btn';

  // Animate in
  document.getElementById('conceptCard').style.animation = 'none';
  document.querySelector('.question-card').style.animation = 'none';
  requestAnimationFrame(() => {
    document.getElementById('conceptCard').style.animation = 'slideRight 0.5s ease both';
    document.querySelector('.question-card').style.animation = 'slideUp 0.5s ease both';
  });
}

function selectOption(idx, btn) {
  if (answered) return;
  answered = true;

  const q = questions[current];
  const buttons = document.querySelectorAll('.option-btn');
  buttons.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  const fbTitle = document.getElementById('feedbackTitle');
  const fbBody = document.getElementById('feedbackBody');

  if (idx === q.correct) {
    score++;
    btn.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fbTitle.innerHTML = '✅ Resposta correta!';
    fbBody.textContent = q.explanation;
  } else {
    btn.classList.add('wrong');
    buttons[q.correct].classList.add('correct');
    fb.className = 'feedback wrong-fb show';
    fbTitle.innerHTML = '❌ Resposta incorreta';
    fbBody.textContent = q.explanation;
  }

  document.getElementById('nextBtn').className = current < questions.length - 1
    ? 'next-btn show' : 'next-btn show';
  document.getElementById('nextBtn').textContent = current < questions.length - 1
    ? '→  Próxima questão' : '→  Ver resultado';
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    loadQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('progressWrap') && (document.getElementById('progressWrap').style.display = 'none');

  const screen = document.getElementById('scoreScreen');
  screen.classList.add('show');

  const pct = score / questions.length;
  const deg = Math.round(pct * 360);
  document.getElementById('scoreCircle').style.setProperty('--score-deg', deg + 'deg');
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreTotal').textContent = `de ${questions.length}`;

  let title, msg;
  if (pct >= 0.9) {
    title = 'Excelente! 🌲';
    msg = 'Você domina os conceitos FSC e está muito bem preparado para a auditoria. Boa sorte!';
  } else if (pct >= 0.7) {
    title = 'Muito bom! 🌿';
    msg = 'Você tem boa base em FSC. Revise os pontos errados e estará pronto para a auditoria.';
  } else if (pct >= 0.5) {
    title = 'Em progresso 📋';
    msg = 'Há espaço para melhorar. Revise os conceitos de CoC, rastreabilidade e rótulos FSC antes da auditoria.';
  } else {
    title = 'Continue estudando 📚';
    msg = 'Refaça o quiz após rever os materiais FSC. Foque em Cadeia de Custódia e documentação obrigatória.';
  }

  document.getElementById('scoreTitle').textContent = title;
  document.getElementById('scoreMsg').textContent = msg;
}

function restart() {
  current = 0;
  score = 0;
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('scoreScreen').classList.remove('show');
  loadQuestion();
}

// Init
loadQuestion();
</script>
